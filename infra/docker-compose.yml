# ============================================================================
# Smart Eyewear — local orchestration (LOCAL ONLY, no production deploy).
#
# Polyrepo layout: build contexts point to sibling repo folders (../<repo>).
# Before `up`: copy infra/.env.example -> infra/.env, and each <repo>/.env.example
# -> <repo>/.env.
#
# ⚠️ gateway/auth/catalog/order have PLACEHOLDER Dockerfiles until backend
#    language (Q2) is decided — they will not build until then.
# ============================================================================

name: smart-eyewear

services:
  # ---------------- Infrastructure ----------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    volumes:
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------- Business services ----------------
  # NOTE: internal services are not published to the host on purpose —
  # all traffic enters through the gateway (North-South).

  gateway:
    build: ../gateway          # ⚠️ language TBD (Q2)
    env_file: ../gateway/.env
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      - auth
      - catalog

  auth:
    build: ../auth             # ⚠️ language TBD (Q2)
    env_file: ../auth/.env
    depends_on:
      postgres:
        condition: service_healthy

  catalog:
    build: ../catalog          # ⚠️ language TBD (Q2)
    env_file: ../catalog/.env
    depends_on:
      postgres:
        condition: service_healthy

  order:
    build: ../order            # ⚠️ language TBD (Q2)
    env_file: ../order/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  face:
    build: ../face
    env_file: ../face/.env
    depends_on:
      minio:
        condition: service_healthy

  reco:
    build: ../reco
    env_file: ../reco/.env
    depends_on:
      - catalog

  web:
    build: ../web
    env_file: ../web/.env
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - gateway

volumes:
  pgdata:
  miniodata:
